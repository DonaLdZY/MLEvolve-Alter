# ============================================================
#  Data & paths
# ============================================================
data_dir: null
dataset_dir: null  # optional unless use_grading_server=True; path to mle-bench dataset root, e.g. /data/mle-bench
desc_file: null
goal: null
eval: null
exp_name: null
exp_id: ""

log_dir: ./runs
log_level: INFO
workspace_dir: ./runs
preprocess_data: True
copy_data: False

# Resource
start_cpu_id: 0
cpu_number: 21

# Model paths
torch_hub_dir: ""       # path to torch hub cache, e.g. /data/pretrain_models/torch_models
pretrain_model_dir: ""  # path to pretrained model weights, e.g. /data/pretrain_models

# ============================================================
#  Code execution
# ============================================================
exec:
  timeout: 32400
  agent_file_name: runfile.py

# ============================================================
#  Agent config
# ============================================================
agent:

  # --- Basic run params ---
  steps: 500
  time_limit: 43200          # 12h
  initial_drafts: 3
  seed: 42
  data_preview: True
  generate_submission: True

  # --- LLM models ---
  code:
    model: deepseek-v4-pro
    temp: 1
    base_url: "https://api.deepseek.com/beta"   # Gemini API endpoint
    api_key: "sk-170ca9aab9684a41bf9c93a0c3f95f26"    # Gemini API key
    enable_thinking: null   # null=provider default, true=force enable, false=force disable when backend supports it
    reasoning_effort: null  # null=provider default; allowed: low|medium|high|xhigh (DeepSeek maps low/medium->high, xhigh->max)
    max_tokens: null        # null/0=do not pass max_tokens; provider/API default decides output cap
  feedback:
    model: deepseek-v4-pro
    temp: 1
    base_url: "https://api.deepseek.com/beta"   # Gemini API endpoint
    api_key: "sk-170ca9aab9684a41bf9c93a0c3f95f26"    # Gemini API key
    enable_thinking: null   # null=provider default, true=force enable, false=force disable when backend supports it
    reasoning_effort: null  # null=provider default; allowed: low|medium|high|xhigh (DeepSeek maps low/medium->high, xhigh->max)
    max_tokens: null        # null/0=do not pass max_tokens; provider/API default decides output cap

  # --- Submission check ---
  check_data_leakage: True

  # --- Code gen mode ---
  use_diff_mode: True                # SEARCH/REPLACE patch

  # --- Branch strategy ---
  fusion_vs_evolution_prob: 0.3
  branch_fusion_trigger_prob: 1.0
  max_fusion_drafts: 2

  # --- Global memory ---
  use_global_memory: True
  memory_similarity_threshold: 0.7
  memory_embedding_backend: openai          # local | openai
  
  memory_embedding_device: cuda
  memory_embedding_model_path: "BAAI/bge-base-en-v1.5"  # HuggingFace model name or local path (local backend)

  memory_embedding_api_key: "sk-4d15bcf18df74d76a253d8ea662c5a34"             # for remote embedding APIs
  memory_embedding_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"            # e.g. https://dashscope.aliyuncs.com/compatible-mode/v1
  memory_embedding_model: "text-embedding-v4"               # e.g. text-embedding-v4

  # --------------------------------------------------------
  #  Search tree params
  # --------------------------------------------------------
  search:
    # Parallel & resources
    parallel_search_num: 3
    num_gpus: 1

    # Node expansion limits
    num_drafts: 5
    num_bugs: 1
    num_improves: 3
    topk_max_improves: 10

    # Debug depth
    max_debug_depth: 20
    back_debug_depth: 3
    debug_prob: 1

    # Improvement criteria
    metric_improvement_threshold: 0.0001
    max_improve_failure: 3

    # Stagnation detection
    branch_stagnation_threshold: 3
    topk_stagnation_threshold: 6
    stagnation_window: 4
    top_candidates_size: 20

    # Explore-exploit soft switch
    explore_switch_start: 0.5
    explore_switch_end: 0.7
    min_exploration_weight: 0.2

    # Top-K node selection
    topk_early_k: 5
    topk_early_max_per_branch: 3
    topk_late_k: 3
    topk_late_max_per_branch: 2

    # Force backprop
    force_backprop_late_threshold: 0.80
    force_backprop_late_prob: 0.5
    force_backprop_mid_threshold: 0.4
    force_backprop_mid_modulo: 3
    recent_best_window: 4

    # Multi-branch fusion conditions
    fusion_min_time_hours: 6
    fusion_max_time_hours: 10
    fusion_min_successful_nodes: 2
    fusion_min_branches: 2

  # --------------------------------------------------------
  #  Exploration constant decay
  # --------------------------------------------------------
  decay:
    exploration_constant: 1.414
    lower_bound: 0.5
    alpha: 0.01
    phase_ratios: [0.3, 0.7]

# ============================================================
#  Cold-start knowledge
# ============================================================
coldstart:
  use_coldstart: True
  task_json_path: "engine/coldstart/competition_tag_classified.json"
  model_json_path: "engine/coldstart/models_guidance_classified.json"
  description: ""

use_grading_server: False
